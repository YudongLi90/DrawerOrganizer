<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drawer Organizer Designer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Drawer Organizer Designer</h1>
    <span class="subtitle">Design custom drawer dividers · Export a code to share</span>
  </header>

  <main>
    <aside id="controls">
      <section>
        <h2>Drawer</h2>
        <label>Units</label>
        <div id="in-unit" class="unit-toggle" role="radiogroup" aria-label="Units" data-value="mm">
          <button type="button" class="active" data-unit-value="mm" role="radio" aria-checked="true">mm</button>
          <button type="button" data-unit-value="in" role="radio" aria-checked="false">inch</button>
        </div>
        <label>Length L <span class="unit-suffix" data-unit>mm</span>
          <input type="number" id="in-L" step="0.1" value="300" />
        </label>
        <label>Width W <span class="unit-suffix" data-unit>mm</span>
          <input type="number" id="in-W" step="0.1" value="200" />
        </label>
        <label>Height H <span class="unit-suffix" data-unit>mm</span>
          <input type="number" id="in-H" step="0.1" value="50" />
        </label>
      </section>

      <section id="selection">
        <h2>Selection</h2>
        <div id="sel-info">Click a cell in the canvas to select it.</div>
        <div class="dim-row">
          <label for="sel-w">Width <span class="unit-suffix" data-unit>mm</span></label>
          <input type="number" id="sel-w" step="0.1" />
          <div id="sel-w-fixed" class="fixed-value" hidden></div>
        </div>
        <div class="dim-row">
          <label for="sel-h">Height <span class="unit-suffix" data-unit>mm</span></label>
          <input type="number" id="sel-h" step="0.1" />
          <div id="sel-h-fixed" class="fixed-value" hidden></div>
        </div>
        <div class="btn-row horizontal">
          <button id="btn-split-v" disabled title="Split with a vertical divider">Split ↔</button>
          <button id="btn-split-h" disabled title="Split with a horizontal divider">Split ↕</button>
        </div>
        <div class="btn-row">
          <button id="btn-remove-split" disabled class="danger" title="Remove the split at this cell">Remove split</button>
        </div>
      </section>

      <section>
        <h2>Design code</h2>
        <label>Export
          <textarea id="tx-export" readonly rows="12"></textarea>
        </label>
        <div class="btn-row horizontal">
          <button id="btn-copy" class="primary">Copy</button>
          <button id="btn-reset">Reset</button>
        </div>
        <label style="margin-top: 16px;">Import
          <textarea id="tx-import" rows="6" placeholder="Paste a design code..."></textarea>
        </label>
        <div class="btn-row">
          <button id="btn-import">Load design</button>
        </div>
        <p class="hint" id="import-msg"></p>
      </section>

      <section>
        <h2>Tips</h2>
        <p class="hint">
          Click a cell to select it. Drag any divider to resize.
          Click a <kbd>W</kbd> or <kbd>H</kbd> label in the canvas to type an exact size.
        </p>
      </section>
    </aside>

    <div id="canvas-wrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
      <input id="canvas-editor" type="number" step="0.1" hidden />
    </div>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
